{{- if not .Values.secret.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "expense-tracker.fullname" . }}-secrets
  labels:
    {{- include "expense-tracker.labels" . | nindent 4 }}
type: Opaque
stringData:
  database-url: {{ include "expense-tracker.databaseUrl" . | quote }}
  migrate-database-url: {{ include "expense-tracker.migrateDatabaseUrl" . | quote }}
  bootstrap-password: {{ .Values.secret.bootstrapPassword | default "" | quote }}
{{- end }}
