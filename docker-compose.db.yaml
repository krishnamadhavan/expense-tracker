# Postgres-only for local migrate/dev (PR03). Full api+db compose arrives in PR05.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: expense
      POSTGRES_PASSWORD: expense
      POSTGRES_DB: expense_tracker
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U expense -d expense_tracker"]
      interval: 3s
      timeout: 3s
      retries: 10
    volumes:
      - expense_pg_data:/var/lib/postgresql/data

volumes:
  expense_pg_data:
